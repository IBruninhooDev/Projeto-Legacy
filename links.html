<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Links Externos - Legacy RP</title>
    <meta
      name="description"
      content="Nossos links oficiais - Instagram, YouTube, Discord e mais."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/css/style.css" />
    <link
      rel="shortcut icon"
      href="src/img/LEGACY_COMMUNITY.png"
      type="image/x-icon"
    />
    <style>
      .links-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 100px);
        padding: 2rem;
        text-align: center;
        background:
          radial-gradient(
            circle at top right,
            rgba(99, 102, 241, 0.12),
            transparent 42%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(255, 255, 255, 0.04),
            transparent 35%
          ),
          var(--bg);
        color: #fff;
      }

      .links-logo {
        width: 120px;
        height: auto;
        margin-bottom: 1.5rem;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        border-radius: 70px;
      }

      .links-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        background: linear-gradient(90deg, #fff, #888);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .links-subtitle {
        font-size: 1rem;
        color: #aaa;
        margin-bottom: 2.5rem;
      }

      .links-list {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        position: relative;
        overflow: hidden;
      }

      .link-btn:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }

      .link-btn.instagram:hover {
        background: linear-gradient(
          45deg,
          #f09433 0%,
          #e6683c 25%,
          #dc2743 50%,
          #cc2366 75%,
          #bc1888 100%
        );
        border-color: transparent;
      }

      .link-btn.youtube:hover {
        background: #ff0000;
        border-color: transparent;
      }

      .link-btn.discord:hover {
        background: #5865f2;
        border-color: transparent;
      }

      .link-icon {
        width: 24px;
        height: 24px;
        margin-right: 12px;
      }

      footer {
        padding: 2rem;
        text-align: center;
        background: #0d0d0d;
        color: #555;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>

            class="brand-logo"
            src="src/img/LEGACY_COMMUNITY.png"
            alt="Logo Legacy RP"
          />
          <span><span class="logo-glow">Legacy</span> RP</span>
        </a>

        <nav class="main-menu" id="mainMenu">
          <a href="index.html">Home</a>
          <a href="sobre.html">Sobre</a>
          <a href="loja.html">Loja</a>
          <a href="galeria.html">Galeria</a>
          <a href="ip.html">IP do Servidor</a>
          <a href="links.html">Social</a>
        </nav>
